version: '3.8'

services:
  # 1. The Message Broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 2. The Quantum Engine (Worker)
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis

  # 3. The API Gateway
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "9999:8080"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis